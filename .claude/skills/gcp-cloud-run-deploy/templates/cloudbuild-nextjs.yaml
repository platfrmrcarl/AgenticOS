# templates/cloudbuild-nextjs.yaml
# Cloud Build pipeline: build → push → deploy Next.js service
# Trigger from GitHub push to main, or run manually:
#   gcloud builds submit --config=cloudbuild-nextjs.yaml --substitutions=_TAG=$(git rev-parse --short HEAD)

substitutions:
  _SERVICE: 'platfrmr-web'
  _REGION: 'us-central1'
  _REPO: 'platfrmr'
  _TAG: 'latest'
  _DB_INSTANCE: 'PROJECT:us-central1:platfrmr-db'  # Replace PROJECT
  _SERVICE_ACCOUNT: 'platfrmr-web-sa'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

steps:
  # 1. Build the container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--file=Dockerfile.nextjs'
      - '--build-arg=NEXT_PUBLIC_APP_URL=https://app.platfrmr.com'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '.'

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_SERVICE_ACCOUNT}@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=${_DB_INSTANCE}'
      - '--set-env-vars=NODE_ENV=production,DB_HOST=/cloudsql/${_DB_INSTANCE}'
      - '--set-secrets=DATABASE_URL=database-url:latest,STRIPE_SECRET_KEY=stripe-secret:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,NEXTAUTH_SECRET=nextauth-secret:latest'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--concurrency=80'
      - '--timeout=300s'
      - '--cpu-boost'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
